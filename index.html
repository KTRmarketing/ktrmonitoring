/* SCOPE_BUTTON_EXACT_STYLE_START */
.scope-toggle{
  display:flex!important;
  align-items:center!important;
  gap:8px!important;
  background:transparent!important;
  border:0!important;
  padding:0!important;
  box-shadow:none!important;
}
.scope-btn{
  height:46px!important;
  border-radius:13px!important;
  padding:4px 14px 4px 5px!important;
  font-size:14px!important;
  font-weight:900!important;
  letter-spacing:-.4px!important;
  font-family:inherit!important;
  display:flex!important;
  align-items:center!important;
  gap:7px!important;
  border:1px solid #e5e7eb!important;
  background:#fff!important;
  color:#6b7280!important;
  cursor:pointer!important;
  box-shadow:0 1px 2px rgba(15,23,42,.04)!important;
}
.scope-btn:hover{
  background:#f8fafc!important;
  color:#374151!important;
}
.scope-btn.active{
  background:#143f96!important;
  border-color:#143f96!important;
  color:#fff!important;
  box-shadow:0 4px 10px rgba(20,63,150,.20)!important;
}
.scope-btn.active[data-scope=global]{
  background:#047857!important;
  border-color:#047857!important;
  color:#fff!important;
  box-shadow:0 4px 10px rgba(4,120,87,.20)!important;
}
.scope-mark-wrap{
  width:38px!important;
  height:38px!important;
  border-radius:50%!important;
  background:#fff!important;
  overflow:hidden!important;
  display:flex!important;
  align-items:center!important;
  justify-content:center!important;
  flex-shrink:0!important;
  box-shadow:0 0 0 1px rgba(255,255,255,.85)!important;
}
.scope-mark-wrap img.scope-mark{
  width:37px!important;
  height:37px!important;
  object-fit:contain!important;
  display:block!important;
  border-radius:0!important;
  max-width:none!important;
  max-height:none!important;
}
.scope-ico{
  display:none!important;
}
.empty-scope .scope-mark-large-wrap{
  width:138px!important;
  height:138px!important;
  border-radius:50%!important;
  background:#fff!important;
  overflow:hidden!important;
  display:flex!important;
  align-items:center!important;
  justify-content:center!important;
  margin-bottom:4px!important;
  box-shadow:0 0 0 1px #e5e7eb!important;
}
.empty-scope .scope-mark-large-wrap img{
  width:132px!important;
  height:132px!important;
  object-fit:contain!important;
}
/* SCOPE_BUTTON_EXACT_STYLE_END */


/* GLOBAL_MARK_ONLY_PATCH_START */
.scope-mark-wrap img.scope-mark{
  object-fit:contain!important;
  border-radius:0!important;
}
.empty-scope .scope-mark-large-wrap img,
.empty-scope img.scope-mark-large{
  object-fit:contain!important;
}
/* GLOBAL_MARK_ONLY_PATCH_END */


/* MOBILE_RESPONSIVE_PATCH_START */

/* 모바일에서는 body 자체 스크롤을 허용해야 주소창/상단영역 때문에 잘리지 않습니다. */

    width:100%!important;
    display:grid!important;
    grid-template-columns:1fr 1fr!important;
    gap:8px!important;

  }

  .stat .lbl{

  }

  .stat .val{

  }

  .stat .sub{

  }

  .filter-wrap{
    padding:10px 0 8px!important;
  }

  .filter-wrap .inner{
    max-width:none!important;
    padding:0 14px!important;
    gap:8px!important;
  }

  .f-row{
    display:flex!important;
    flex-wrap:nowrap!important;
    overflow-x:auto!important;
    gap:6px!important;
    padding-bottom:2px!important;
    -webkit-overflow-scrolling:touch!important;
  }

  .f-row::-webkit-scrollbar{
    display:none!important;
  }

  .f-lbl{

    font-size:11px!important;

  }

  .f-btn,.pd-btn{

  }

  .list-header{

  }

  .list-header .inner{
    max-width:none!important;
    padding:0 14px!important;
    align-items:flex-start!important;
    gap:6px!important;
  }

  .list-title-wrap{

    gap:4px!important;
  }

  .list-title{
    font-size:13px!important;
  }

  .last-updated{

  }

  .list-meta{
    font-size:10.5px!important;
    padding-top:2px!important;
  }

  .scroll-area{
    height:auto!important;
    overflow:visible!important;
    padding:12px 0 28px!important;
  }

  .scroll-area .inner{
    max-width:none!important;
    padding:0 10px!important;
  }

  .month-divider{
    margin:14px 0 8px!important;
    gap:8px!important;
  }

  .month-text{
    font-size:12px!important;
  }

  .news-card{

    padding:13px 12px 12px 12px!important;
    margin-bottom:9px!important;
    border-left-width:4px!important;
  }

  .nc-top{
    gap:6px!important;
    margin-bottom:7px!important;
    flex-wrap:wrap!important;
  }

  .chip{

    padding:2px 7px!important;
  }

  .nc-org{
    font-size:10.5px!important;

  }

    +'<button class="f-btn active" data-ag="전체" onclick="clickAg(this)">전체</button>'
    +list.map(ag=>'<button class="f-btn" data-ag="'+ag+'" onclick="clickAg(this)">'+ag+'</button>').join('');
}
function clickScope(btn){curScope=btn.dataset.scope;curAg='전체';document.querySelectorAll('.scope-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAgencyFilters();render();}
function clickAg(btn){curAg=btn.dataset.ag;document.querySelectorAll('#ag-row .f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function clickPd(btn){curPd=btn.dataset.ym;document.querySelectorAll('.pd-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function ym(d){return d?d.slice(0,7):''}
function monthLabel(s){if(!s)return'-';const[y,m]=s.split('-');return y.slice(2)+'년 '+parseInt(m)+'월'}
function matchPeriod(dateStr,period){const y=(dateStr||'').slice(0,4);const m=ym(dateStr);if(period==='전체')return true;if(period.length===7)return m===period;if(period==='2025'||period==='2024'||period==='2023')return y===period;if(period==='기타')return !['2026','2025','2024','2023'].includes(y);return true;}
function isThisWeek(d){const now=new Date(),dt=new Date(d),day=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));const sun=new Date(mon);sun.setDate(mon.getDate()+6);return dt>=mon&&dt<=sun}
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtSummaryHtml(s){
  s=(s||'').trim();
  if(!s)return '';
  s=s.replace(/\\n/g,'\n');
  s=s.replace(/\s*•\s*/g,'\n• ');
  s=s.replace(/\s*[\-\*]\s+/g,'\n• ');
  let parts=s.split(/\n+/).map(x=>x.replace(/^[•\-\*]\s*/,'').trim()).filter(Boolean);
  if(parts.length<=1){
    parts=s.replace(/다\. /g,'다.|\n').replace(/니다\. /g,'니다.|\n').replace(/됩니다\. /g,'됩니다.|\n').replace(/\. /g,'.|\n').split(/\|\n|\n+/).map(x=>x.replace(/^[•\-\*]\s*/,'').trim()).filter(Boolean);
  }
  return parts.slice(0,3).map(x=>'<span class="sum-bullet">'+escHtml(x)+'</span>').join('');
}

function pad2(n){return String(n).padStart(2,'0')}
function updateLiveDateTime(){
  const now=new Date();
  const y=now.getFullYear(), m=pad2(now.getMonth()+1), d=pad2(now.getDate());
  const hh=pad2(now.getHours()), mm=pad2(now.getMinutes());
  const clock=document.getElementById('live-clock');

  if(today) today.textContent='📅 '+y+'년 '+Number(m)+'월 '+Number(d)+'일 '+hh+':'+mm+' 기준';
}
