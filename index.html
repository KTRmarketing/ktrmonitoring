const FULL={KTR:'한국화학융합시험연구원',KCL:'한국건설생활환경시험연구원',KTL:'한국산업기술시험원',KTC:'한국기계전기전자시험연구원',FITI:'FITI시험연구원',KOTITI:'KOTITI시험연구원',KATRI:'KATRI시험연구원'};
let curAg='전체',curPd='전체';
function clickAg(btn){curAg=btn.dataset.ag;document.querySelectorAll('#ag-row .f-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function clickPd(btn){curPd=btn.dataset.ym;document.querySelectorAll('.pd-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function ym(d){return d?d.slice(0,7):''}
function monthLabel(s){if(!s)return'-';const[y,m]=s.split('-');return y.slice(2)+'년 '+parseInt(m)+'월'}
function matchPeriod(dateStr,period){const y=(dateStr||'').slice(0,4);const m=ym(dateStr);if(period==='전체')return true;if(period.length===7)return m===period;if(period==='2025'||period==='2024'||period==='2023')return y===period;if(period==='기타')return !['2026','2025','2024','2023'].includes(y);return true;}
function isThisWeek(d){const now=new Date(),dt=new Date(d),day=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));const sun=new Date(mon);sun.setDate(mon.getDate()+6);return dt>=mon&&dt<=sun}
function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtSummaryHtml(s){
  s=(s||'').trim();
  if(!s)return '';
  let parts=[];
  if(s.includes('•') || s.includes('\n')){
    parts=s.split(/\n+/).map(x=>x.replace(/^[•\-\*]\s*/,'').trim()).filter(Boolean);
  }else{
    parts=s.replace(/다\. /g,'다.|').replace(/니다\. /g,'니다.|').replace(/됩니다\. /g,'됩니다.|').replace(/\. /g,'.|').split('|').map(x=>x.trim()).filter(Boolean);
  }
  if(parts.length<=1){
    return '<span class="sum-bullet">'+escHtml(s.replace(/^[•\-\*]\s*/,''))+'</span>';
  }
  return parts.slice(0,3).map(x=>'<span class="sum-bullet">'+escHtml(x)+'</span>').join('');
}
function render(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  let list=DATA.filter(d=>{
    if(curAg!=='전체'&&d['기관']!==curAg)return false;
    if(curPd!=='전체'&&!matchPeriod(d['게시일'],curPd))return false;
    if(q&&!(d['제목']||'').toLowerCase().includes(q)&&!(d['summary']||'').toLowerCase().includes(q))return false;
    return true;
  });
  document.getElementById('s-week').textContent=DATA.filter(d=>isThisWeek(d['게시일'])).length+'건';
  document.getElementById('result-cnt').textContent='총 '+list.length+'건';
  const groups={};
  list.forEach(d=>{const k=ym(d['게시일']);if(!groups[k])groups[k]=[];groups[k].push(d);});
  const months=Object.keys(groups).filter(Boolean).sort((a,b)=>b.localeCompare(a));
  const el=document.getElementById('news');
  if(!list.length){el.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}
  el.innerHTML=months.map(m=>{
    const cards=groups[m].map(d=>{
      const ag=d['기관']||'',org=d['공식기관명']||FULL[ag]||'',sum=fmtSummaryHtml(d['summary']||''),lnk=d['링크']||'#';
      return '<div class="news-card card-'+ag+'" onclick="if(!event.target.closest(\'a\')) window.open(lnk,\'_blank\',\'noopener\')">'
        +'<div class="nc-top"><span class="chip chip-'+ag+'">'+ag+'</span><span class="nc-org">'+org+'</span><span class="nc-date">'+d['게시일']+'</span></div>'
        +'<div class="nc-title">'+d['제목']+'</div>'
        +'<div class="nc-bottom"><span class="ai-tag">✦ AI 요약</span><span class="nc-summary">'+sum+'</span><a class="nc-link" href="'+lnk+'" target="_blank" rel="noopener">원문 보기 →</a></div>'
        +'</div>';
    }).join('');
    return '<div class="month-divider"><span class="month-text">'+monthLabel(m)+'</span><span class="month-cnt">'+groups[m].length+'건</span><div class="month-line"></div></div>'+cards;
  }).join('');
}
function pad2(n){return String(n).padStart(2,'0')}
function updateLiveDateTime(){
  const now=new Date();
  const y=now.getFullYear(), m=pad2(now.getMonth()+1), d=pad2(now.getDate());
  const hh=pad2(now.getHours()), mm=pad2(now.getMinutes()), ss=pad2(now.getSeconds());
  const clock=document.getElementById('live-clock');
  if(clock) clock.textContent=y+'.'+m+'.'+d+' '+hh+':'+mm+':'+ss+' KST';
  const today=document.getElementById('today-lbl');
  if(today) today.textContent='📅 '+y+'년 '+Number(m)+'월 '+Number(d)+'일 '+hh+':'+mm+' 기준';
}
updateLiveDateTime();
setInterval(updateLiveDateTime,1000);
render();
</script></body></html>
